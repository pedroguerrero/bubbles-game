<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1"
    />
    <title>Bubbles</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0a0a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        user-select: none;
      }
      canvas {
        cursor: crosshair;
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      // ── Constants ──────────────────────────────────────────────────────────────
      const R = 20; // bubble radius
      const D = R * 2; // bubble diameter
      const COLS = 11; // columns in even rows
      const ROWS = 13; // grid rows (0-indexed)
      const ROW_H = R * Math.sqrt(3); // vertical distance between row centers ≈ 34.64
      const W = COLS * D; // canvas width = 440
      const H = 600; // canvas height
      const TOP = 45; // y of row-0 centers
      const SX = W / 2; // shooter x
      const SY = H - 65; // shooter y
      const SPEED = 10;
      const INIT_ROWS = 5;
      const COLORS = [
        '#e74c3c',
        '#3498db',
        '#2ecc71',
        '#f1c40f',
        '#9b59b6',
        '#e67e22',
      ];

      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      let scale = 1;

      function resize() {
        const aspect = W / H;
        let cw = window.innerWidth;
        let ch = window.innerHeight;
        if (cw / ch > aspect) cw = ch * aspect;
        else ch = cw / aspect;

        canvas.style.width = Math.round(cw) + 'px';
        canvas.style.height = Math.round(ch) + 'px';

        // Match canvas internal resolution to real screen pixels (handles HiDPI/Retina)
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(cw * dpr);
        canvas.height = Math.round(ch * dpr);
        scale = canvas.width / W;
      }
      window.addEventListener('resize', resize);
      resize();

      // ── State ──────────────────────────────────────────────────────────────────
      let grid, cur, nxt, mx, my, score, state, particles;
      // state: 'play' | 'over' | 'win'

      // ── Grid helpers ───────────────────────────────────────────────────────────
      function ncols(r) {
        return r % 2 === 0 ? COLS : COLS - 1;
      }
      function bx(r, c) {
        return c * D + R + (r % 2 === 1 ? R : 0);
      }
      function by(r) {
        return TOP + r * ROW_H;
      }
      function rndColor() {
        return COLORS[Math.floor(Math.random() * COLORS.length)];
      }

      function neighbors(r, c) {
        const odd = r % 2 === 1;
        return [
          [r, c - 1],
          [r, c + 1],
          odd ? [r - 1, c] : [r - 1, c - 1],
          odd ? [r - 1, c + 1] : [r - 1, c],
          odd ? [r + 1, c] : [r + 1, c - 1],
          odd ? [r + 1, c + 1] : [r + 1, c],
        ].filter(
          ([rr, cc]) => rr >= 0 && rr < ROWS && cc >= 0 && cc < ncols(rr),
        );
      }

      function bfsMatch(r0, c0, color) {
        const seen = new Set(),
          q = [[r0, c0]],
          out = [];
        while (q.length) {
          const [r, c] = q.shift(),
            k = r + ',' + c;
          if (seen.has(k)) continue;
          seen.add(k);
          if (grid[r][c] !== color) continue;
          out.push([r, c]);
          for (const [nr, nc] of neighbors(r, c))
            if (!seen.has(nr + ',' + nc) && grid[nr][nc] === color)
              q.push([nr, nc]);
        }
        return out;
      }

      function ceilingReachable() {
        const seen = new Set(),
          q = [];
        for (let c = 0; c < ncols(0); c++) if (grid[0][c]) q.push([0, c]);
        while (q.length) {
          const [r, c] = q.shift(),
            k = r + ',' + c;
          if (seen.has(k)) continue;
          seen.add(k);
          for (const [nr, nc] of neighbors(r, c))
            if (!seen.has(nr + ',' + nc) && grid[nr][nc]) q.push([nr, nc]);
        }
        return seen;
      }

      function snap(px, py) {
        let best = null,
          bestD = Infinity;
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < ncols(r); c++) {
            if (grid[r][c]) continue;
            const valid =
              r === 0 || neighbors(r, c).some(([nr, nc]) => grid[nr][nc]);
            if (!valid) continue;
            const d = (px - bx(r, c)) ** 2 + (py - by(r)) ** 2;
            if (d < bestD) {
              bestD = d;
              best = [r, c];
            }
          }
        }
        return best;
      }

      // ── Particles ──────────────────────────────────────────────────────────────
      function burst(px, py, color) {
        for (let i = 0; i < 10; i++) {
          const a = Math.random() * Math.PI * 2,
            s = 2 + Math.random() * 5;
          particles.push({
            x: px,
            y: py,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            color,
            r: 3 + Math.random() * 4,
            life: 1,
          });
        }
      }

      // ── Game logic ─────────────────────────────────────────────────────────────
      function place(r, c, color) {
        grid[r][c] = color;

        const match = bfsMatch(r, c, color);
        if (match.length >= 3) {
          for (const [mr, mc] of match) {
            burst(bx(mr, mc), by(mr), grid[mr][mc]);
            grid[mr][mc] = null;
            score += 10;
          }
          const connected = ceilingReachable();
          for (let rr = 0; rr < ROWS; rr++)
            for (let cc = 0; cc < ncols(rr); cc++)
              if (grid[rr][cc] && !connected.has(rr + ',' + cc)) {
                burst(bx(rr, cc), by(rr), grid[rr][cc]);
                grid[rr][cc] = null;
                score += 5;
              }
        }

        if (!grid.some((row) => row.some((v) => v))) {
          state = 'win';
          return;
        }

        for (let rr = ROWS - 3; rr < ROWS; rr++)
          for (let cc = 0; cc < ncols(rr); cc++)
            if (grid[rr][cc]) {
              state = 'over';
              return;
            }
      }

      function fire() {
        if (state !== 'play' || cur.moving) return;
        const dx = mx - SX,
          dy = my - SY;
        if (dy >= -10) return;
        const len = Math.hypot(dx, dy);
        cur.vx = (dx / len) * SPEED;
        cur.vy = (dy / len) * SPEED;
        cur.moving = true;
      }

      function nextBubble() {
        cur = nxt;
        cur.x = SX;
        cur.y = SY;
        cur.vx = 0;
        cur.vy = 0;
        cur.moving = false;
        nxt = { x: 0, y: 0, vx: 0, vy: 0, color: rndColor(), moving: false };
      }

      function update() {
        particles = particles.filter((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15;
          p.life -= 0.025;
          return p.life > 0;
        });

        if (!cur.moving) return;

        cur.x += cur.vx;
        cur.y += cur.vy;

        if (cur.x < R) {
          cur.x = R;
          cur.vx = Math.abs(cur.vx);
        }
        if (cur.x > W - R) {
          cur.x = W - R;
          cur.vx = -Math.abs(cur.vx);
        }

        // Hit ceiling → snap to row 0 area
        if (cur.y <= TOP + R) {
          const s = snap(cur.x, by(0));
          if (s) place(s[0], s[1], cur.color);
          nextBubble();
          return;
        }

        // Collision with grid bubbles
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < ncols(r); c++)
            if (
              grid[r][c] &&
              Math.hypot(cur.x - bx(r, c), cur.y - by(r)) < D - 1
            ) {
              const s = snap(cur.x, cur.y);
              if (s) place(s[0], s[1], cur.color);
              nextBubble();
              return;
            }
      }

      // ── Drawing ────────────────────────────────────────────────────────────────
      function lgt(hex, a) {
        const n = parseInt(hex.slice(1), 16);
        return `rgb(${Math.min(255, (n >> 16) + a)},${Math.min(255, ((n >> 8) & 255) + a)},${Math.min(255, (n & 255) + a)})`;
      }
      function drk(hex, a) {
        const n = parseInt(hex.slice(1), 16);
        return `rgb(${Math.max(0, (n >> 16) - a)},${Math.max(0, ((n >> 8) & 255) - a)},${Math.max(0, (n & 255) - a)})`;
      }

      function drawBubble(x, y, color, r = R) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        const g = ctx.createRadialGradient(
          x - r * 0.35,
          y - r * 0.35,
          r * 0.04,
          x,
          y,
          r,
        );
        g.addColorStop(0, lgt(color, 80));
        g.addColorStop(0.5, color);
        g.addColorStop(1, drk(color, 50));
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = drk(color, 70);
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // shine highlight
        ctx.beginPath();
        ctx.arc(x - r * 0.3, y - r * 0.32, r * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();
      }

      function drawAimLine() {
        const dx = mx - SX,
          dy = my - SY;
        if (dy >= -10) return;
        const len = Math.hypot(dx, dy);
        let vx = dx / len,
          vy = dy / len,
          x = SX,
          y = SY;
        ctx.save();
        ctx.setLineDash([5, 9]);
        ctx.strokeStyle = 'rgba(255,255,255,0.28)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x, y);
        for (let i = 0; i < 65; i++) {
          x += vx * 8;
          y += vy * 8;
          if (x < R) {
            x = R;
            vx = Math.abs(vx);
          }
          if (x > W - R) {
            x = W - R;
            vx = -Math.abs(vx);
          }
          if (y < TOP) break;
          ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function draw() {
        ctx.save();
        ctx.scale(scale, scale);

        // Background gradient
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#0f3460');
        bg.addColorStop(1, '#16213e');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Ceiling bar
        ctx.fillStyle = '#e94560';
        ctx.fillRect(0, 0, W, TOP - 2);
        ctx.fillStyle = '#c0392b';
        ctx.fillRect(0, TOP - 4, W, 4);
        // Title in ceiling
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'center';
        ctx.letterSpacing = '3px';
        ctx.fillText('BUBBLES', W / 2, TOP / 2 + 5);
        ctx.letterSpacing = '0px';

        // Danger zone dashed line
        const dangerY = by(ROWS - 3);
        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.strokeStyle = 'rgba(231,76,60,0.45)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, dangerY);
        ctx.lineTo(W, dangerY);
        ctx.stroke();
        ctx.restore();

        // Shooter platform
        ctx.fillStyle = '#0d1b3e';
        ctx.fillRect(0, SY + R + 12, W, H - SY - R - 12);

        // Grid bubbles
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < ncols(r); c++)
            if (grid[r][c]) drawBubble(bx(r, c), by(r), grid[r][c]);

        // Particles
        for (const p of particles) {
          ctx.globalAlpha = p.life;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        if (state === 'play') {
          if (!cur.moving) drawAimLine();

          // Shooter ring
          ctx.beginPath();
          ctx.arc(SX, SY, R + 8, 0, Math.PI * 2);
          ctx.fillStyle = '#1a2a4a';
          ctx.fill();
          ctx.strokeStyle = cur.moving ? '#4a6a8a' : '#7fa0c0';
          ctx.lineWidth = 3;
          ctx.stroke();

          // Bubble: in shooter when idle, in flight when moving
          if (!cur.moving) drawBubble(SX, SY, cur.color);
          else drawBubble(cur.x, cur.y, cur.color);
        }

        // HUD – score
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        roundRect(5, 5, 148, 33, 6);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('Puntos: ' + score, 14, 26);

        // HUD – next bubble
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        roundRect(W - 115, 5, 110, 33, 6);
        ctx.fill();
        ctx.fillStyle = '#aaa';
        ctx.font = '13px Arial';
        ctx.textAlign = 'right';
        ctx.fillText('Siguiente:', W - 32, 25);
        drawBubble(W - 16, 21, nxt.color, 13);

        // Game over / win overlay
        if (state !== 'play') {
          ctx.fillStyle = 'rgba(0,0,0,0.72)';
          ctx.fillRect(0, 0, W, H);
          ctx.textAlign = 'center';
          ctx.fillStyle = state === 'win' ? '#2ecc71' : '#e74c3c';
          ctx.font = 'bold 52px Arial';
          ctx.fillText(
            state === 'win' ? 'GANASTE!' : 'GAME OVER',
            W / 2,
            H / 2 - 45,
          );
          ctx.fillStyle = '#fff';
          ctx.font = '22px Arial';
          ctx.fillText('Puntos: ' + score, W / 2, H / 2 + 8);
          ctx.fillStyle = '#bbb';
          ctx.font = '15px Arial';
          ctx.fillText('Haz clic para reiniciar', W / 2, H / 2 + 50);
        }

        ctx.restore();
      }

      // ── Init ───────────────────────────────────────────────────────────────────
      function init() {
        score = 0;
        state = 'play';
        particles = [];
        mx = SX;
        my = SY - 100;

        grid = Array.from({ length: ROWS }, (_, r) =>
          new Array(ncols(r)).fill(null),
        );
        for (let r = 0; r < INIT_ROWS; r++)
          for (let c = 0; c < ncols(r); c++) grid[r][c] = rndColor();

        cur = { x: SX, y: SY, vx: 0, vy: 0, color: rndColor(), moving: false };
        nxt = { x: 0, y: 0, vx: 0, vy: 0, color: rndColor(), moving: false };
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      // ── Input ──────────────────────────────────────────────────────────────────
      function gameCoords(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      canvas.addEventListener('mousemove', (e) => {
        const p = gameCoords(e.clientX, e.clientY);
        mx = p.x;
        my = p.y;
      });

      canvas.addEventListener('click', () => {
        if (state !== 'play') {
          init();
          return;
        }
        fire();
      });

      // Touch: arrastrar para apuntar, soltar para disparar
      canvas.addEventListener(
        'touchstart',
        (e) => {
          e.preventDefault();
          const t = e.touches[0];
          const p = gameCoords(t.clientX, t.clientY);
          mx = p.x;
          my = p.y;
        },
        { passive: false },
      );

      canvas.addEventListener(
        'touchmove',
        (e) => {
          e.preventDefault();
          const t = e.touches[0];
          const p = gameCoords(t.clientX, t.clientY);
          mx = p.x;
          my = p.y;
        },
        { passive: false },
      );

      canvas.addEventListener(
        'touchend',
        (e) => {
          e.preventDefault();
          if (state !== 'play') {
            init();
            return;
          }
          fire();
        },
        { passive: false },
      );

      init();
      loop();
    </script>
  </body>
</html>
